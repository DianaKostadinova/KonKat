name: Keep Render Alive

on:
  schedule:
    # Every 10 minutes. Render free spins down after 15 min idle.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://konkat.onrender.com/ || echo "000")
            echo "Attempt $i: HTTP $code"
            # Any HTTP response (even 404) means the JVM is up — we only retry on connection failures.
            if [ "$code" != "000" ] && [ "$code" != "502" ] && [ "$code" != "503" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "Backend did not respond after 3 attempts"
          exit 0  # Don't fail the workflow — keep cron running
