<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#111111"/>

  <!-- Left C-bracket (coral) — 150° arc on the left side -->
  <path d="M 43 77 A 28 28 0 0 1 43 23"
        fill="none" stroke="#E8593C" stroke-width="12" stroke-linecap="round"/>

  <!-- Right C-bracket (dark red) — 150° arc on the right side -->
  <path d="M 57 23 A 28 28 0 0 1 57 77"
        fill="none" stroke="#9B2F1E" stroke-width="12" stroke-linecap="round"/>

  <!-- Centre dot -->
  <circle cx="50" cy="50" r="5.5" fill="#E8593C" opacity="0.75"/>
  <circle cx="50" cy="50" r="2.5" fill="#111111"/>
</svg>
