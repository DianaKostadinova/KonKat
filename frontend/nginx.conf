server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for smaller JS/CSS bundles
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Proxy REST API calls to the Spring Boot backend
    location /api/ {
        proxy_pass         http://backend:8082/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket connections (STOMP over WS)
    location /ws {
        proxy_pass             http://backend:8082/ws;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
    }

    # Proxy file uploads (large body allowed)
    location /api/messages/upload {
        proxy_pass         http://backend:8082/api/messages/upload;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        client_max_body_size 50M;
    }

    # Angular HTML5 routing — serve index.html for all non-file requests
    location / {
        try_files $uri $uri/ /index.html;
    }
}
