@if (isLoading()) {
  <app-loading-screen />
} @else {
  @if (showShell()) {
    <!-- Global red-fuzz blobs — visible on all authenticated pages -->
    <div class="g-blob g-blob-1"></div>
    <div class="g-blob g-blob-2"></div>
    <div class="g-blob g-blob-3"></div>
    <app-navbar />
  }

  @if (showShell()) {
    <div class="app-shell">
      <app-sidebar />
      <main class="main-content">
        <router-outlet />
      </main>
      <app-right-panel />
    </div>
  } @else {
    <router-outlet />
  }
}
<app-toast-host />
