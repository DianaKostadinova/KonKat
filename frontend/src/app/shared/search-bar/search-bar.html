<div class="flex items-center gap-2 rounded-xl border border-[#2a2a2a] bg-[#1a1a1a] px-3 py-2 focus-within:border-[#E8593C] transition-colors">
  <span class="material-icons-outlined text-[#888888]" style="font-size: 18px;">search</span>
  <input
    class="flex-1 bg-transparent border-none outline-none text-sm text-[#f0f0f0] placeholder-[#888888]"
    placeholder="Search people, projects, hackathons…"
    [(ngModel)]="query"
    (keydown)="onKeydown($event)"
  />
  @if (query.length >= 2) {
    <button
      class="text-[#888888] hover:text-[#E8593C] bg-transparent border-none cursor-pointer p-0 transition-colors"
      (click)="onSearch()"
    >
      <span class="material-icons" style="font-size: 16px;">arrow_forward</span>
    </button>
  }
</div>
