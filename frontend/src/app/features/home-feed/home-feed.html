<div class="flex flex-col gap-4 p-4 max-w-3xl mx-auto w-full">

  <!-- Create Post Box -->
  <div class="flex flex-col gap-3 rounded-xl border border-[#2a2a2a] bg-[#1a1a1a] p-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-[#2a2a2a] border border-[#3a3a3a] flex items-center justify-center flex-shrink-0">
        <span class="material-icons text-[#888888]" style="font-size: 26px;">account_circle</span>
      </div>
      <textarea
        class="flex-1 bg-[#111111] border border-[#2a2a2a] rounded-lg px-3 py-2 text-sm text-[#f0f0f0] placeholder-[#888888] outline-none resize-none focus:border-[#E8593C] transition-colors"
        placeholder="Share a new project, ask for help, or post an idea..."
        [value]="newPostText()"
        (input)="onPostInput($event)"
        (keydown.enter)="$event.preventDefault(); submitQuickPost()"
        rows="2"
      ></textarea>
    </div>
    <div class="flex items-center justify-between border-t border-[#2a2a2a] pt-3 flex-wrap gap-2">
      <div class="flex items-center gap-1 flex-wrap">
        <button
          (click)="openModal('code')"
          class="flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-xs text-[#888888] bg-transparent border-none cursor-pointer hover:bg-[#2a2a2a] hover:text-[#f0f0f0] transition-all duration-200"
        >
          <span class="material-icons-outlined" style="font-size: 16px;">code</span>
          <span class="hidden sm:inline">Code Snippet</span>
        </button>
        <button
          (click)="openModal('media')"
          class="flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-xs text-[#888888] bg-transparent border-none cursor-pointer hover:bg-[#2a2a2a] hover:text-[#f0f0f0] transition-all duration-200"
        >
          <span class="material-icons-outlined" style="font-size: 16px;">image</span>
          <span class="hidden sm:inline">Media</span>
        </button>
        <button
          (click)="openModal('text')"
          class="flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-xs text-[#888888] bg-transparent border-none cursor-pointer hover:bg-[#2a2a2a] hover:text-[#f0f0f0] transition-all duration-200"
        >
          <span class="material-icons-outlined" style="font-size: 16px;">calendar_month</span>
          <span class="hidden sm:inline">Event</span>
        </button>
      </div>
      <button
        (click)="submitQuickPost()"
        [disabled]="!newPostText().trim()"
        class="rounded-lg px-4 py-1.5 text-xs font-semibold text-white bg-[#E8593C] border-none cursor-pointer hover:bg-[#d04a2e] transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed"
      >
        Post
      </button>
    </div>
  </div>

  <!-- Posts -->
  @for (post of posts(); track post.id) {
    <div [attr.id]="'post-' + post.id">
      <app-post-card [post]="post" />
    </div>
  }

</div>

<!-- Create Post Modal -->
@if (showModal()) {
  <app-create-post-modal
    [initialType]="modalInitialType()"
    (closed)="showModal.set(false)"
    (posted)="showModal.set(false)"
  />
}
