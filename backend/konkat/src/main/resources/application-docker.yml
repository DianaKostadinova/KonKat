spring:
  application:
    name: konkat

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/konkat}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

app:
  clerk:
    jwks-uri: ${CLERK_JWKS_URI:https://frank-penguin-10.clerk.accounts.dev/.well-known/jwks.json}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@konkat.dev}
    base-url: ${MAIL_BASE_URL:http://localhost:4200}

spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
